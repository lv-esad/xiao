services:
  - type: web
    name: xiao-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDirectory: backend
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
