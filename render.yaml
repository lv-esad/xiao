services:
  - type: web
    name: xiao-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDirectory: backend
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User will provide this from Neon
